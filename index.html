<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JFC x URC Stock Monitoring</title>
    
    <meta name="theme-color" content="#f8fafc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PSE Monitoring">
    
    <link rel="manifest" href='data:application/manifest+json,{"name":"JFC URC Monitor","short_name":"StockMon","start_url":".","display":"standalone","background_color":"#ffffff","theme_color":"#1e40af"}'>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
        }
        .chart-container {
            height: 500px;
            width: 100%;
            background: #fff;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Matching the color scheme from image_b2015a.jpg */
        .bid-col-bg { background-color: #eff6ff !important; } /* Very light blue */
        .ask-col-bg { background-color: #fef2f2 !important; } /* Very light red */
        .bid-text { color: #2563eb; }
        .ask-text { color: #dc2626; }
        
        .orderbook-table th {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.025em;
            color: #64748b;
            padding: 8px 4px;
            font-weight: 700;
        }
    </style>
</head>
<body class="p-2 md:p-6">

    <header class="mb-4 flex flex-row items-center justify-between px-2">
        <h1 class="text-xl md:text-2xl font-bold text-gray-800 flex items-center gap-3">
            <span class="w-8 h-8 bg-blue-700 rounded-lg flex items-center justify-center text-white shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z" />
                </svg>
            </span>
            JFC x URC Stock Monitoring
        </h1>
        
        <div class="flex flex-col items-end">
            <div class="flex items-center gap-2 text-gray-700 font-mono font-bold text-sm" id="live-clock">
                --:--:-- --
            </div>
            <div class="text-[10px] text-gray-400 font-bold uppercase" id="live-date">
                ---, --- --, ----
            </div>
        </div>
    </header>

    <main class="grid grid-cols-1 lg:grid-cols-2 gap-4">
        
        <!-- JFC SECTION -->
        <section id="jfc-card" class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col">
            <div class="p-3 border-b border-gray-100 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-red-600 rounded-lg flex items-center justify-center text-white font-bold">J</div>
                    <div>
                        <h2 class="text-sm font-bold text-gray-800">JFC</h2>
                        <p class="text-[9px] text-gray-400 font-bold uppercase">Jollibee Foods Corp</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="toggleFullscreen('jfc-card')" class="p-1.5 hover:bg-gray-100 rounded text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />
                        </svg>
                    </button>
                    <span class="text-[9px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded border border-blue-100">1H BASELINE</span>
                </div>
            </div>
            
            <div class="chart-container border-b border-gray-100">
                <iframe 
                    src="https://www.tradingview-widget.com/embed-widget/advanced-chart/pse/?locale=en#%7B%22width%22%3A%22100%25%22%2C%22height%22%3A500%2C%22symbol%22%3A%22PSE%3AJFC%22%2C%22interval%22%3A%2260%22%2C%22timezone%22%3A%22Asia%2FManila%22%2C%22theme%22%3A%22light%22%2C%22style%22%3A%2210%22%2C%22allow_symbol_change%22%3Afalse%2C%22utm_source%22%3A%22frames.pse.com.ph%22%2C%22utm_medium%22%3A%22widget%22%2C%22utm_campaign%22%3A%22advanced-chart%22%7D" 
                    class="w-full h-full border-0"
                ></iframe>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-[11px] text-center border-collapse orderbook-table">
                    <thead class="bg-gray-50 border-b border-gray-100">
                        <tr>
                            <th class="w-[10%]"># Bid</th>
                            <th class="w-[20%]">Bid Vol</th>
                            <th class="w-[20%]">Bid</th>
                            <th class="w-[20%]">Ask</th>
                            <th class="w-[20%]">Ask Vol</th>
                            <th class="w-[10%]"># Ask</th>
                        </tr>
                    </thead>
                    <tbody id="jfc-orderbook" class="text-gray-700 font-medium">
                        <!-- Rows generated by JS -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- URC SECTION -->
        <section id="urc-card" class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col">
            <div class="p-3 border-b border-gray-100 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-blue-800 rounded-lg flex items-center justify-center text-white font-bold">U</div>
                    <div>
                        <h2 class="text-sm font-bold text-gray-800">URC</h2>
                        <p class="text-[9px] text-gray-400 font-bold uppercase">Universal Robina</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="toggleFullscreen('urc-card')" class="p-1.5 hover:bg-gray-100 rounded text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />
                        </svg>
                    </button>
                    <span class="text-[9px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded border border-blue-100">1H BASELINE</span>
                </div>
            </div>

            <div class="chart-container border-b border-gray-100">
                <iframe 
                    src="https://www.tradingview-widget.com/embed-widget/advanced-chart/pse/?locale=en#%7B%22width%22%3A%22100%25%22%2C%22height%22%3A500%2C%22symbol%22%3A%22PSE%3AURC%22%2C%22interval%22%3A%2260%22%2C%22timezone%22%3A%22Asia%2FManila%22%2C%22theme%22%3A%22light%22%2C%22style%22%3A%2210%22%2C%22allow_symbol_change%22%3Afalse%2C%22utm_source%22%3A%22frames.pse.com.ph%22%2C%22utm_medium%22%3A%22widget%22%2C%22utm_campaign%22%3A%22advanced-chart%22%7D" 
                    class="w-full h-full border-0"
                ></iframe>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-[11px] text-center border-collapse orderbook-table">
                    <thead class="bg-gray-50 border-b border-gray-100">
                        <tr>
                            <th class="w-[10%]"># Bid</th>
                            <th class="w-[20%]">Bid Vol</th>
                            <th class="w-[20%]">Bid</th>
                            <th class="w-[20%]">Ask</th>
                            <th class="w-[20%]">Ask Vol</th>
                            <th class="w-[10%]"># Ask</th>
                        </tr>
                    </thead>
                    <tbody id="urc-orderbook" class="text-gray-700 font-medium">
                        <!-- Rows generated by JS -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer class="mt-8 mb-4 text-center text-gray-400 text-[10px] italic">
        Real-time Visual Analytics for the Philippine Market
    </footer>

    <script>
        function toggleFullscreen(elementId) {
            const elem = document.getElementById(elementId);
            if (!document.fullscreenElement) {
                elem.requestFullscreen().catch(err => {
                    console.error(`Error attempting to enable full-screen mode: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        function formatNum(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        /**
         * STREAMING_CHUNK:Correcting Orderbook Price Tiers...
         */
        function populateOrderBook(elementId, basePrice) {
            const tbody = document.getElementById(elementId);
            let html = '';
            
            // PSE typical spread for these price ranges is around 0.10 or 0.20
            const spread = 0.20; 

            for (let i = 0; i < 10; i++) {
                // Best Bid is at the top (highest price)
                // Best Ask is at the top (lowest price)
                const bidPrice = (basePrice - (i * spread)).toFixed(2);
                const askPrice = (parseFloat(basePrice) + spread + (i * spread)).toFixed(2);
                
                const bidVol = Math.floor(Math.random() * 40000) + 1000;
                const askVol = Math.floor(Math.random() * 40000) + 1000;
                const bidCount = Math.floor(Math.random() * 25) + 1;
                const askCount = Math.floor(Math.random() * 25) + 1;

                html += `
                    <tr class="border-b border-gray-50 hover:bg-gray-50/50 transition-colors">
                        <td class="py-2 text-gray-400">${bidCount}</td>
                        <td class="py-2">${formatNum(bidVol)}</td>
                        <td class="py-2 bid-text font-bold bid-col-bg">${bidPrice}</td>
                        <td class="py-2 ask-text font-bold ask-col-bg">${askPrice}</td>
                        <td class="py-2">${formatNum(askVol)}</td>
                        <td class="py-2 text-gray-400">${askCount}</td>
                    </tr>
                `;
            }
            tbody.innerHTML = html;
        }

        /**
         * STREAMING_CHUNK:Updating Clock & Date Display...
         */
        function updateClock() {
            const now = new Date();
            const timeOptions = { 
                timeZone: 'Asia/Manila', 
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: true 
            };
            const dateOptions = {
                timeZone: 'Asia/Manila',
                weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
            };
            document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-US', timeOptions);
            document.getElementById('live-date').innerText = now.toLocaleDateString('en-US', dateOptions);
        }

        // Init
        window.onload = function() {
            // Prices updated to match the chart values in image_b2015a.jpg
            populateOrderBook('jfc-orderbook', 141.00);
            populateOrderBook('urc-orderbook', 61.10);
            
            updateClock();
            setInterval(updateClock, 1000);
            
            // Refresh order book every 5 seconds to simulate live movement
            setInterval(() => {
                populateOrderBook('jfc-orderbook', 141.00);
                populateOrderBook('urc-orderbook', 61.10);
            }, 5000);
        };

        /**
         * STREAMING_CHUNK:Registering Service Worker...
         */
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'pse-v3';
                self.addEventListener('install', (e) => {
                    e.waitUntil(caches.open(CACHE_NAME).then((cache) => cache.addAll(['./'])));
                });
                self.addEventListener('fetch', (e) => {
                    e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
                });
            `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob))
                .catch(err => console.log('SW failed:', err));
        }
    </script>
</body>
</html>
